spring:
  profiles:
    active: test
  application:
    name: spring-ai-alibaba-demo
  datasource:
    url: jdbc:postgresql://${PGVECTOR_HOST:localhost}:${PGVECTOR_PORT:5432}/test
    username: ${PGVECTOR_USERNAME:postgres}
    password: ${PGVECTOR_PASSWORD:zAzHHplnxXb7QvT02QMl0oPV}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  ai:
    openai:
      api-key: sk-tlnpsktyxjqqaxkfjanxsgyzhdgmjssjoapiwcnfkixirwaj
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: deepseek-ai/DeepSeek-V3.1-Terminus
          temperature: 0.7
          top-p: 0.7
          # top-k: 50
          max-tokens: 4096
          frequency-penalty: 0.0
      embedding:
        options:
          model: Qwen/Qwen3-Embedding-8B
          dimensions: 1536
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
    siliconflow:
      rerank:
        api-url: ${SILICONFLOW_RERANK_API_URL:https://api.siliconflow.cn/v1/rerank}
        api-key: ${SILICONFLOW_RERANK_API_KEY:${SILICONFLOW_API_KEY:}}
        model: ${SILICONFLOW_RERANK_MODEL:Qwen/Qwen3-Reranker-8B}
        instruction: ${SILICONFLOW_RERANK_INSTRUCTION:Please rerank the documents based on the query.}
        top-n: ${SILICONFLOW_RERANK_TOP_N:5}
        return-documents: ${SILICONFLOW_RERANK_RETURN_DOCUMENTS:true}

server:
  port: 8080

app:
  rag:
    rewrite:
      enabled: ${APP_RAG_REWRITE_ENABLED:true}
      prompt-template: ${APP_RAG_REWRITE_PROMPT_TEMPLATE:classpath:prompts/rag_rewrite_prompt.txt}
  retrieval:
    initial-top-k: ${APP_RETRIEVAL_INITIAL_TOP_K:20}
    final-top-n: ${APP_RETRIEVAL_FINAL_TOP_N:5}
    similarity-threshold: ${APP_RETRIEVAL_SIMILARITY_THRESHOLD:0.0}

prompt:
  template: classpath:prompts/dynamic_prompt_template.txt
  defaults:
    persona: 通用知识助手
    channel: 默认渠道

fallback:
  answer:
    no-context: ${FALLBACK_ANSWER_NO_CONTEXT:当前知识库暂无相关内容，请稍后重试}
    error: ${FALLBACK_ANSWER_ERROR:AI 服务暂时不可用，请稍后再试}

retrieval:
  context:
    min-threshold: ${RETRIEVAL_CONTEXT_MIN_THRESHOLD:1}
